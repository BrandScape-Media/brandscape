<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Brandscape</title>
    <script>
      // GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      // Deep links like /dashboard/projects 404 on a static host; this
      // redirects to / with the path encoded in the query string, and the
      // matching script in index.html restores the real URL for the router.
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
