<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-light.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brandscape — AI-Powered Marketing Automation</title>
    <meta name="description" content="End-to-end AI automation for marketing agencies. From discovery to delivery — research, strategy, scripts, and content generation, all in one platform." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Restore the URL that public/404.html encoded into the query string
      // (GitHub Pages SPA fallback — rafgraph/spa-github-pages).
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&')
          }).join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body class="bg-brand-black text-brand-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
